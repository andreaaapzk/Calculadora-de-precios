<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Arte - Andrea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --rosa-fondo: #fff0f3; --rosa-tarjeta: #f8d7da; --rosa-ovalo: #f5c6cb; --rosa-pastel: #ffb6c1; }
        body { background-color: var(--rosa-fondo); padding: 20px; font-family: sans-serif; }
        
        .card { border-radius: 20px; border: none; box-shadow: 0 4px 15px rgba(255, 182, 193, 0.3); background: white; }
        
        /* Tarjetas de fotos con el color que pediste */
        .foto-card { 
            background: var(--rosa-tarjeta); 
            border-radius: 20px; 
            padding: 12px; 
            text-align: center;
            height: 100%;
        }
        .img-ref { 
            width: 100%; height: 180px; object-fit: contain; 
            background-color: white; border-radius: 15px; margin-bottom: 10px;
        }
        
        /* El óvalo para el texto */
        .badge-ovalo {
            background-color: var(--rosa-ovalo);
            color: #721c24;
            padding: 5px 20px;
            border-radius: 50px; /* Esto crea la forma ovalada */
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-block;
        }

        .btn-personalizado { background-color: var(--rosa-pastel); border: none; color: white; transition: 0.3s; }
        .btn-personalizado:hover { background-color: #ff9fb1; }
        .price-display { font-size: 2.5rem; font-weight: bold; color: var(--rosa-pastel); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3">
            <div class="card p-4">
                <h4 class="text-center" style="color: var(--rosa-pastel);">Calculadora</h4>
                <select id="tipo" class="form-select my-3" onchange="actualizarBase()">
                    <option value="funda">Funda</option>
                    <option value="lienzo">Lienzo</option>
                </select>
                <div class="mb-3">
                    <label>Costo material ($):</label>
                    <input type="number" id="base" class="form-control" value="125">
                </div>
                <select id="nivel" class="form-select mb-3">
                    <option value="200">Básico</option>
                    <option value="350">Intermedio</option>
                    <option value="500">Premium</option>
                </select>
                <button onclick="calcular()" class="btn btn-personalizado w-100">Calcular</button>
                <div id="resultado" class="price-display text-center mt-3">$0</div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="card p-4">
                <h5 style="color: var(--rosa-pastel);" class="mb-4">Guía Visual Real</h5>
                <div class="row g-3">
                    <div class="col-md-3"><div class="foto-card"><img src="img/funda_morat.jpeg" class="img-ref"><div class="badge-ovalo">Básico</div></div></div>
                    <div class="col-md-3"><div class="foto-card"><img src="img/funda_ale.jpeg" class="img-ref"><div class="badge-ovalo">Básico</div></div></div>
                    <div class="col-md-3"><div class="foto-card"><img src="img/funda_chicas_superpoderosas.jpeg" class="img-ref"><div class="badge-ovalo">Intermedio</div></div></div>
                    <div class="col-md-3"><div class="foto-card"><img src="img/funda_colibri.jpeg" class="img-ref"><div class="badge-ovalo">Intermedio</div></div></div>
                    <div class="col-md-3"><div class="foto-card"><img src="img/funda_perro.jpeg" class="img-ref"><div class="badge-ovalo">Premium</div></div></div>
                    <div class="col-md-3"><div class="foto-card"><img src="img/lienzo_spiderman.jpeg" class="img-ref"><div class="badge-ovalo">Básico</div></div></div>
                    <div class="col-md-3"><div class="foto-card"><img src="img/lienzo_pareja_morado.jpeg" class="img-ref"><div class="badge-ovalo">Básico</div></div></div>
                    <div class="col-md-3"><div class="foto-card"><img src="img/lienzo_pareja_cu.jpeg" class="img-ref"><div class="badge-ovalo">Intermedio</div></div></div>
                    <div class="col-md-3"><div class="foto-card"><img src="img/lienzo_pareja_moto.jpeg" class="img-ref"><div class="badge-ovalo">Premium</div></div></div>
                    <div class="col-md-3"><div class="foto-card"><img src="img/esqueleto_rana.jpeg" class="img-ref"><div class="badge-ovalo">Premium</div></div></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function actualizarBase() { document.getElementById('base').value = document.getElementById('tipo').value === 'funda' ? 125 : 55; }
    function calcular() {
        const base = parseInt(document.getElementById('base').value);
        const nivel = parseInt(document.getElementById('nivel').value);
        let total = Math.ceil((base + nivel) / 10) * 10;
        document.getElementById('resultado').innerText = '$' + total;
    }
</script>
</body>
</html>
