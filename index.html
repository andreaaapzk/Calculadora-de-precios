<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andyyy Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --rosa-fondo: #fff0f3; --rosa-tarjeta: #f8d7da; --rosa-ovalo: #f5c6cb; --rosa-pastel: #ffb6c1; }
        body { background-color: var(--rosa-fondo); padding: 10px; font-family: sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background: white; margin-bottom: 15px; }
        .foto-card { background: var(--rosa-tarjeta); border-radius: 15px; padding: 10px; text-align: center; }
        .img-ref { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; }
        .badge-ovalo { background-color: var(--rosa-ovalo); color: #721c24; padding: 4px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; display: inline-block; }
        .btn-personalizado { background-color: var(--rosa-pastel); border: none; color: white; padding: 12px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <!-- Calculadora -->
    <div class="card p-3">
        <h5 class="text-center" style="color: var(--rosa-pastel);">Calculadora Andyyy Studio</h5>
        <select id="tipo" class="form-select my-2" onchange="actualizarBase()">
            <option value="funda">Funda</option>
            <option value="lienzo">Lienzo</option>
        </select>
        <input type="number" id="base" class="form-control mb-2" value="125">
        <select id="nivel" class="form-select mb-2">
            <option value="200">Básico</option>
            <option value="350">Intermedio</option>
            <option value="500">Premium</option>
        </select>
        <button onclick="calcular()" class="btn btn-personalizado w-100">Calcular Precio</button>
        <div id="resultado" class="text-center h3 mt-2" style="color: var(--rosa-pastel);">Total: $0</div>
    </div>

    <!-- Galería -->
    <div class="row g-2">
        <div class="col-6"><div class="foto-card"><img src="img/funda_morat.jpeg" class="img-ref"><div class="badge-ovalo">Básico</div></div></div>
        <div class="col-6"><div class="foto-card"><img src="img/funda_chicas_superpoderosas.jpeg" class="img-ref"><div class="badge-ovalo">Intermedio</div></div></div>
        <!-- Agrega aquí tus otras fotos -->
    </div>
</div>
<script>
    function actualizarBase() { document.getElementById('base').value = document.getElementById('tipo').value === 'funda' ? 125 : 55; }
    function calcular() {
        const base = parseInt(document.getElementById('base').value);
        const nivel = parseInt(document.getElementById('nivel').value);
        document.getElementById('resultado').innerText = 'Total: $' + (Math.ceil((base + nivel) / 10) * 10);
    }
</script>
</body>
</html>
